# electron-builder configuration
# Generate installer untuk Windows 7/8/10/11
# Targets:
#   - NSIS installer (.exe) — recommended
#   - Portable (.exe) — untuk USB/tanpa install
#
# Auto-update: publish ke GitHub releases dengan tag vX.Y.Z
# Set env GH_TOKEN untuk auto-publish.

appId: com.herdianrony.brilinkpos
productName: BRILink POS
copyright: Copyright © 2024 herdianrony

directories:
  output: dist-electron
  buildResources: electron/build

# File yang di-bundle ke dalam app.asar
files:
  - electron/dist/**/*
  - electron/build/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"

# extraResources: file di luar asar (Next.js standalone + static assets)
extraResources:
  - from: .next/standalone
    to: standalone
    filter: ["**/*"]
  - from: .next/static
    to: standalone/.next/static
    filter: ["**/*"]
  - from: public
    to: standalone/public
    filter: ["**/*"]

# Windows target
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
  icon: electron/build/icon.png

# NSIS installer config
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BRILink POS
  language: 1057 # Indonesian (Bahasa Indonesia)

# Portable config (USB-stick, tanpa install)
portable:
  artifactName: ${productName}-Portable-${version}.${ext}

# Publish ke GitHub releases
publish:
  provider: github
  owner: herdianrony
  repo: pos-and-brilink-application
  releaseType: release
  # Token: set env GH_TOKEN saat build

# Kompressi
compression: maximum

# Async building untuk memory optimization
# Build hanya untuk Windows
# Linux/macOS bisa diaktifkan jika perlu
