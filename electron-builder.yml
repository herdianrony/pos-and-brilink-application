# electron-builder configuration
# Generate installer untuk Windows 7/8/10/11
# Targets:
#   - NSIS installer (.exe) — recommended
#   - Portable (.exe) — untuk USB/tanpa install
#
# Auto-update: publish ke GitHub releases dengan tag vX.Y.Z
# Set env GH_TOKEN untuk auto-publish.

appId: com.herdianrony.brilinkpos
productName: BRILink POS
copyright: Copyright © 2024 herdianrony

directories:
  output: dist-electron
  buildResources: electron/build

# File yang di-bundle ke dalam app.asar
files:
  - electron/dist/**/*
  - electron/build/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/.DS_Store"

# afterPack: copy Next.js standalone (termasuk node_modules) ke resources/
# electron-builder otomatis prune node_modules dari extraResources, jadi
# kita copy manual di afterPack hook (setelah pruning selesai).
afterPack: scripts/after-pack.js

# Windows target (Windows 10/11 only — Electron 28+ butuh Node.js 18+)
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: electron/build/icon.ico

# NSIS installer config
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BRILink POS
  language: 1057 # Indonesian (Bahasa Indonesia)

# Portable config (USB-stick, tanpa install)
portable:
  artifactName: ${productName}-Portable-${version}.${ext}

# Publish ke GitHub releases
publish:
  provider: github
  owner: herdianrony
  repo: pos-and-brilink-application
  releaseType: release
  # Token: set env GH_TOKEN saat build

# Kompressi
compression: maximum
